name: Robot Framework API Tests

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 1234
          POSTGRES_DB: meu_produto_app
        ports:
          - 5432:5432 # Alterado para a porta padrão para simplificar a conexão
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências e Preparar Banco
        env:
          # DATABASE_URL corrigida para porta 5432 e usuário postgres
          DATABASE_URL: "postgresql://postgres:1234@localhost:5432/meu_produto_app?schema=public"
        run: |
          npm install
          npx prisma generate
          npx prisma migrate deploy

      - name: Instalar Robot Framework
        run: |
          pip install robotframework robotframework-requests

      - name: Subir API em Background
        env:
          DATABASE_URL: "postgresql://postgres:1234@localhost:5432/meu_produto_app?schema=public"
          JWT_SECRET: "sua_secret_de_teste"
        run: |
          npm run start &
          # Aguarda a raiz da API responder. Se /users retornar 404 ou 401 inicialmente, o wait-on falha.
          npx wait-on http://localhost:3000/ --timeout 90000 

      - name: Rodar Testes do Robot
        run: npm run test:api

      - name: Upload de Relatórios (Artifacts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-framework-results
          path: tests/logs/